api_version: movate/v1
kind: Agent

name: faq-agent
version: 0.1.0
description: An FAQ assistant. Answers questions concisely with a confidence score.
owner: ""

# Validated tier: passes eval gate, used as the canonical scaffold example.
# Not certified — that requires a sign-off review which this demo agent
# doesn't warrant.
lifecycle: validated

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 512
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.json
  output: ./schema/output.json

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.50

tags:
  - faq
