# Eval scoring for the case-reasoner agent.
#
# DEFAULT: subset_match.
#
# Why subset_match (not llm_judge):
#
# The dataset's ``expected`` only pins the target tone — the agent's
# full output is {headline, body, next_steps, tone}. Subset-match
# checks that ``actual["tone"] == expected["tone"]`` and tolerates
# the extra fields. Deterministic, no LLM call, no API key for the
# judge, no cross-family enforcement to satisfy. CI-friendly.
#
# Limitation: subset_match doesn't catch quality issues — body
# leaks internal terms, headline accusatory on auto_reject, etc.
# For richer scoring, switch to llm_judge below (requires a
# cross-family API key: agent runs on OpenAI by default, so the
# judge has to run on a different family like Anthropic).
#
# To switch to llm_judge:
#   1. Set ``method: llm_judge`` below.
#   2. Uncomment the ``model:`` and ``rubric:`` blocks at the
#      bottom of this file.
#   3. Ensure both OPENAI_API_KEY and ANTHROPIC_API_KEY are set
#      (agent uses OpenAI, judge uses Anthropic — cross-family).
#   4. Regenerate the baseline:
#      movate eval agents/case-reasoner --gate 0.0 \
#        --output-baseline .movate/case-reasoner/baseline.json

method: subset_match
threshold: 0.7

# --- llm_judge config (commented; see "To switch" above) ----------------
#
# model:
#   provider: anthropic/claude-haiku-4-5-20251001
#   params:
#     temperature: 0.0
#     max_tokens: 512
#
# rubric: |
#   Score the agent's output against the rules and expected tone.
#
#   Pass criteria (score 1.0):
#     1. `tone` exactly equals the expected tone.
#     2. NO internal terms leak into headline or body. Specifically NONE of:
#        "risk_score", "severity", "indicator", rule codes (e.g.
#        "tampered_serial", "low_resolution_invoice"), "the model",
#        "AI", "automated system", "decision engine", numeric confidence
#        values.
#     3. headline is <= 80 chars and matches the decision (success
#        confirmation for auto_approve / matter-of-fact for auto_reject /
#        "need a closer look" for human_review).
#     4. body is 2-4 sentences AND personalises with customer_name if
#        present (e.g. "Hi Maya,") AND references product_summary
#        naturally if present.
#     5. next_steps is 1-4 imperative phrases the customer can do now.
#
#   Partial credit (score 0.5):
#     Minor violation — e.g. tone right but body slightly verbose, OR
#     body misses customer_name personalisation, OR a next_step is
#     phrased as a statement rather than imperative.
#
#   Fail (score 0.0):
#     Tone mismatch, OR any internal term leaked, OR headline accusatory
#     on auto_reject, OR body cites no specific findings on auto_reject,
#     OR > 4 next_steps.
