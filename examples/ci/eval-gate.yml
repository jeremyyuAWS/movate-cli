# Example: gate PRs on movate eval scores.
#
# Copy this file into your *consumer* repo (the repo holding your agents) at
# `.github/workflows/eval-gate.yml`, adjust the matrix to point at your
# agents, and commit. The workflow has two jobs:
#
#   1. `gate-pr` — runs on every PR. Loads the committed baseline JSON and
#      fails the build if mean_score or pass_rate dropped past the
#      configured `--regression-tolerance`.
#
#   2. `refresh-baseline` — runs on push to main. Writes the new baseline
#      JSON back into `.movate/<agent>/baseline.json` and opens a follow-up
#      commit (or PR) to keep the baseline current.
#
# Hermetic mode (--mock) is the default so the gate doesn't need API keys.
# For real-model evals, set provider keys in repo secrets and remove --mock.

name: eval-gate

on:
  pull_request:
    paths:
      - "agents/**"
      - ".movate/**"
  push:
    branches: [main]
    paths:
      - "agents/**"

jobs:
  # -------------------------------------------------------------------------
  # PR gate: diff against the committed baseline; fail if regressed.
  # -------------------------------------------------------------------------
  gate-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # List every agent you want gated. Each entry expects a baseline at
        # `.movate/<agent-name>/baseline.json` — refresh it via the
        # `refresh-baseline` job below or manually with
        # `movate eval ./agents/<name> --mock --output-baseline ...`.
        agent:
          - faq-agent
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install movate
        run: uv pip install --system movate-cli

      - name: Check baseline exists
        run: |
          test -f ".movate/${{ matrix.agent }}/baseline.json" || {
            echo "::error::missing .movate/${{ matrix.agent }}/baseline.json"
            echo "::notice::run on main: movate eval ./agents/${{ matrix.agent }} --mock --output-baseline .movate/${{ matrix.agent }}/baseline.json"
            exit 1
          }

      - name: Run eval against baseline
        # Exits 1 on regression past --regression-tolerance, gating the PR.
        # Tune --regression-tolerance up to ~0.05 for noisy LLM-as-judge.
        run: |
          uv run movate eval "./agents/${{ matrix.agent }}" \
            --mock \
            --baseline-file ".movate/${{ matrix.agent }}/baseline.json" \
            --regression-tolerance 0.0 \
            --output json \
            > eval-result.json
          cat eval-result.json

      - name: Annotate PR with diff summary
        if: always()
        run: |
          if [ -f eval-result.json ]; then
            jq -r '
              "## movate eval — \(.agent)",
              "",
              "- mean_score: \(.baseline.mean_score) → \(.mean_score) (Δ \(.baseline.mean_score_delta))",
              "- pass_rate:  \(.baseline.pass_rate) → \(.pass_rate) (Δ \(.baseline.pass_rate_delta))",
              "- regression: \(.baseline.regression)"
            ' eval-result.json >> "$GITHUB_STEP_SUMMARY"
          fi

  # -------------------------------------------------------------------------
  # Main-branch refresh: write the new baseline back into the repo.
  # -------------------------------------------------------------------------
  refresh-baseline:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to commit the refreshed baseline
    strategy:
      matrix:
        agent:
          - faq-agent
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install movate
        run: uv pip install --system movate-cli

      - name: Refresh baseline
        run: |
          uv run movate eval "./agents/${{ matrix.agent }}" \
            --mock \
            --gate 0.0 \
            --output-baseline ".movate/${{ matrix.agent }}/baseline.json"

      - name: Commit refreshed baseline
        run: |
          git config user.name "movate-bot"
          git config user.email "bot@movate.com"
          if ! git diff --quiet ".movate/${{ matrix.agent }}/baseline.json"; then
            git add ".movate/${{ matrix.agent }}/baseline.json"
            git commit -m "chore(eval): refresh ${{ matrix.agent }} baseline"
            git push
          else
            echo "baseline unchanged"
          fi
