api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: A new movate agent
owner: ""

# lifecycle state — gates promotion to higher environments and CI checks.
#
# Scaffolds start `draft`. Graduate explicitly as the agent earns trust:
#
#   draft        — actively under development (default)
#   experimental — trialing; OK in dev / staging only
#   validated    — passed evals + manual review; OK in any env
#   certified    — passed strict CI gate + sign-off; the "regulated" tier
#   deprecated   — still works; new uses discouraged; surfaces a warning
#   archived     — no longer functional; loader refuses
#
# `movate validate --strict` fails on `draft` so CI gates don't accidentally
# ship a half-written agent. Promote to at least `validated` before merging.
lifecycle: draft

# runtime selects which execution path movate uses to talk to the model.
# Default is `litellm` (provider-portable via LiteLLM). Uncomment one of
# the others when their adapters ship (v0.6+):
#
#   runtime: native_anthropic   # direct anthropic SDK — tool-use, MCP, etc.
#   runtime: native_openai      # direct openai SDK — structured outputs, etc.
#   runtime: langchain          # delegate to a LangChain Runnable entry-point
#
# runtime: litellm

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 1024
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

schema:
  input: ./schema/input.json
  output: ./schema/output.json

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.50

tags: []
