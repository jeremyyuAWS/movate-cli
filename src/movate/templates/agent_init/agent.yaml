api_version: movate/v1
kind: Agent

name: __AGENT_NAME__
version: 0.1.0
description: A new movate agent
owner: ""

# Marketplace metadata (all optional). The Mova iO Agent Marketplace UI
# reads these as the source of truth for catalog, profiles, search.
# Leave any field empty / unset and that row stays out of `mdk show`.
#
# role: short noun phrase for the job category ('support-triage',
#   'data-analyst'). Used as a marketplace filter facet.
# persona: one sentence on voice/tone. Used to render the agent profile
#   and as a style anchor in prompt-authoring tooling.
# capabilities: slug-style list of things this agent does. Each entry
#   must be lowercase-alphanumeric-with-hyphens; consumers use these
#   as URL-safe search facets.
role: ""
persona: ""
capabilities: []

# runtime selects which execution path movate uses to talk to the model.
# Default is `litellm` (provider-portable via LiteLLM). Uncomment one of
# the others when their adapters ship (v0.6+):
#
#   runtime: native_anthropic   # direct anthropic SDK — tool-use, MCP, etc.
#   runtime: native_openai      # direct openai SDK — structured outputs, etc.
#   runtime: langchain          # delegate to a LangChain Runnable entry-point
#
# runtime: litellm

model:
  provider: openai/gpt-4o-mini-2024-07-18
  params:
    temperature: 0.0
    max_tokens: 1024
  fallback:
    - provider: anthropic/claude-haiku-4-5-20251001

prompt: ./prompt.md

# I/O schemas — inline shorthand (compiled to JSON Schema at load time).
#
# Why inline: avoids hopping between agent.yaml and a separate
# schema/*.json file for tiny contracts. YAML lets you add comments
# (which JSON doesn't) and reads top-to-bottom like the rest of the
# agent.yaml. Strict-by-default: every field listed below is
# required; unknown fields at runtime fail validation.
#
# Shorthand syntax:
#   field: string              -> required string
#   field: string?             -> optional string ('?' suffix on the type)
#   field: integer             -> required integer
#   field: number              -> required number (int or float)
#   field: boolean             -> required boolean
#   status: pending|done|failed  -> required string enum
#   tags: [string]             -> array of strings
#   user: { name: string, age: integer }   -> nested object
#
# For genuinely complex contracts (regex, oneOf, $refs, $defs) keep
# the path form: `input: ./schema/input.json` pointing at a full
# JSON Schema file. Both forms work first-class.
schema:
  input:
    # The user-facing message or question the agent receives.
    text: string
  output:
    # The agent's user-facing reply. Must be a string per the prompt
    # template's "Output Schema" section.
    message: string

# Skills — declare here to give the model access to callable tools at
# inference time (Python functions, HTTP endpoints, MCP tools). The
# init template ships an example pattern under `./skills/example-skill/`
# — open its README.md to see how a skill.yaml is structured + how to
# move it to the project-level `skills/` folder where the loader
# actually discovers it. Uncomment + name your skills here once
# you've moved them up:
#
# skills:
#   - example-skill
skills: []

evals:
  dataset: ./evals/dataset.jsonl

timeouts:
  call_ms: 30000
  total_ms: 60000

budget:
  max_cost_usd_per_run: 0.50

tags: []
